- name: Homelab
  columns:
    - size: full
      widgets:
        - type: custom-api
          title: Minecraft
          url: https://api.mcstatus.io/v2/status/java/horizont2.ggwp.cc
          cache: 30s
          template: |
            {{ if .JSON.Bool "online" }}
            <div>
              <strong>{{ .JSON.String "host" }}</strong> 🟢<br>
              {{ .JSON.String "version.name_clean" }}<br>
              {{ .JSON.Int "players.online" }}/{{ .JSON.Int "players.max" }} Spieler
            </div>
            {{ else }}
            <div>
              <strong>{{ .JSON.String "host" }}</strong> 🔴 Offline
            </div>
            {{ end }}

    - size: small
      widgets:
        - type: monitor
          title: Services
          cache: 1m
          sites:
            - title: CasaOS
              url: http://100.89.20.120:90


- name: Gaming
  columns:
    - size: small
      widgets:
        - type: twitch-top-games
          limit: 20
          collapse-after: 13
          exclude:
            - just-chatting
            - pools-hot-tubs-and-beaches
            - music
            - art
            - asmr

    - size: full
      widgets:
        - type: group
          widgets:
            - type: reddit
              subreddit: pcgaming
              show-thumbnails: true
            - type: reddit
              subreddit: games

        - type: videos
          style: grid-cards
          collapse-after-rows: 3
          channels:
            - UCNvzD7Z-g64bPXxGzaQaa4g
            - UCZ7AeeVbyslLM_8-nVy2B8Q
            - UCHDxYLv8iovIbhrfl16CNyg
            - UC9PBzalIcEQCsiIkq36PyUA

    - size: small
      widgets:
        - type: reddit
          subreddit: gamingnews
          limit: 7
          style: vertical-cards

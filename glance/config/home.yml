- name: Home
  head-widgets:
    - type: search
      search-engine: google
      bangs:
        - title: YouTube
          shortcut: "!yt"
          url: https://www.youtube.com/results?search_query={QUERY}
        - title: Amazon
          shortcut: "!az"
          url: https://www.amazon.com/s?k={QUERY}
        - title: Disney+
          shortcut: "!ds"
          url: https://www.disneyplus.com/search?q={QUERY}
        - title: Netflix
          shortcut: "!nf"
          url: https://www.netflix.com/search?q={QUERY}
        - title: YouTube Studio
          shortcut: "!yts"
          url: https://studio.youtube.com
        - title: ZimaOs
          shortcut: "!os"
          url: http://100.124.203.85/#/
        - title: ChatGPT
          shortcut: "!ch"
          url: https://chatgpt.com
        - title: Namemc
          shortcut: "!nc"
          url: https://de.namemc.com/search?q={QUERY}

  columns:
    - size: small
      widgets:
        - type: calendar
          first-day-of-week: monday

        - type: monitor
          title: Services
          cache: 1m
          sites:
            - title: Lachscloud
              url: https://data.lachscloud.de/
              icon: https://i.postimg.cc/Rh1SsVMD/lachs-pf.png
            - title: Speedtest
              url: https://speedtest.lachscloud.de/
              icon: si:speedtest
            - title: LachsFlix
              url: https://stream.lachscloud.de/
              icon: https://i.postimg.cc/Xv9rYhq9/Lachsfelx.png
            - title: VM (Tailscale)
              url: http://100.124.203.85/modules/zimaos_zvm
              icon: http://100.124.203.85/modules/zimaos_zvm/zvm.svg
    - size: full
      widgets:
        - type: twitch-channels
          collapse-after: 10
          channels:
            - chaospav
            - galaxiekatze08
            - benutzerlachs
            - thejocraft_live
            - irongirl_lp
            - schrottsoke660
            - spacemitx
